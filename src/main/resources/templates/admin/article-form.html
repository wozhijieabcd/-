<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${article.id != null} ? '编辑文章' : '新建文章')}"></head>
<body>
<th:block th:replace="~{fragments/admin-layout :: shell('articles', ~{::main})}">
    <main>
        <h4 class="mb-4">
            <i class="bi me-2" th:classappend="${article.id != null} ? 'bi-pencil-square' : 'bi-plus-lg'"></i>
            <span th:text="${article.id != null} ? '编辑文章' : '新建文章'"></span>
        </h4>

        <form th:action="@{/admin/article}" method="post" class="card border-0 shadow-sm">
            <div class="card-body">
                <input type="hidden" name="id" th:value="${article.id}" th:if="${article.id != null}">

                <div class="mb-3">
                    <label class="form-label fw-bold">标题</label>
                    <input type="text" name="title" class="form-control form-control-lg" th:value="${article.title}"
                           placeholder="请输入文章标题" required autofocus>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">分类</label>
                        <select name="categoryId" class="form-select">
                            <option value="">无分类</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}"
                                    th:text="${cat.name}"
                                    th:selected="${article.categoryId == cat.id}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">状态</label>
                        <select name="status" class="form-select">
                            <option value="1" th:selected="${article.status == 1 || article.status == null}">已发布</option>
                            <option value="0" th:selected="${article.status == 0}">草稿</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">选项</label>
                        <div class="form-check mt-2">
                            <input class="form-check-input" type="checkbox" name="isTop" value="1" id="isTop"
                                   th:checked="${article.isTop == 1}">
                            <label class="form-check-label" for="isTop">置顶文章</label>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">内容</label>
                    <div id="editor-container" style="border: 1px solid #dee2e6; border-radius: 0 0 6px 6px;"></div>
                    <textarea name="content" id="editor-hidden" style="display:none;" th:text="${article.content}"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">摘要 <small class="text-muted">（留空则自动从正文提取）</small></label>
                    <textarea name="summary" class="form-control" rows="2" th:text="${article.summary}"
                              placeholder="文章摘要，留空则自动生成"></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4">保存</button>
                    <a th:href="@{/admin/articles}" class="btn btn-outline-secondary">取消</a>
                </div>
            </div>
        </form>
    </main>
</th:block>

<link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
<style>
    #editor-container { height: 500px; }
    .ql-toolbar { border-radius: 6px 6px 0 0; border-color: #dee2e6; }
    .ql-container { font-size: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
</style>
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
<script>
    const quill = new Quill('#editor-container', {
        theme: 'snow',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ 'color': [] }, { 'background': [] }],
                [{ 'align': [] }],
                ['blockquote', 'code-block'],
                [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                ['link', 'image'],
                ['clean']
            ]
        },
        placeholder: '开始写作...'
    });

    /* 编辑时回填已有内容 */
    const hidden = document.getElementById('editor-hidden');
    if (hidden.value) {
        quill.root.innerHTML = hidden.value;
    }

    /* 表单提交时将 HTML 写入隐藏域 */
    document.querySelector('form').addEventListener('submit', function() {
        hidden.value = quill.root.innerHTML;
    });
</script>
</body>
</html>
