<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('文章管理 - 后台管理')}"></head>
<body>
<th:block th:replace="~{fragments/admin-layout :: shell('articles', ~{::main})}">
    <main>
        <!-- Alerts -->
        <div class="alert alert-success alert-dismissible fade show" th:if="${success}" th:text="${success}"><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
        <div class="alert alert-danger alert-dismissible fade show" th:if="${error}" th:text="${error}"><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0"><i class="bi bi-file-text me-2"></i>文章管理</h4>
            <a th:href="@{/admin/article/new}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> 写文章</a>
        </div>

        <!-- Filters -->
        <div class="card border-0 shadow-sm mb-3">
            <div class="card-body">
                <form class="row g-2" th:action="@{/admin/articles}" method="get">
                    <div class="col-md-3">
                        <select name="categoryId" class="form-select form-select-sm">
                            <option value="">全部分类</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}"
                                    th:text="${cat.name}"
                                    th:selected="${categoryId == cat.id}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select name="status" class="form-select form-select-sm">
                            <option value="">全部状态</option>
                            <option value="1" th:selected="${status == 1}">已发布</option>
                            <option value="0" th:selected="${status == 0}">草稿</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <input type="text" name="keyword" class="form-control form-control-sm" placeholder="搜索标题或摘要..." th:value="${keyword}">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-sm btn-outline-primary w-100">筛选</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Table -->
        <div class="card border-0 shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover mb-0" th:if="${articlePage != null && !articlePage.records.isEmpty()}">
                    <thead class="table-light"><tr>
                        <th style="width:40px;">ID</th>
                        <th>标题</th>
                        <th>分类</th>
                        <th>状态</th>
                        <th>阅读</th>
                        <th>时间</th>
                        <th style="width:200px;">操作</th>
                    </tr></thead>
                    <tbody>
                        <tr th:each="a : ${articlePage.records}">
                            <td th:text="${a.id}"></td>
                            <td>
                                <span class="badge bg-warning me-1" th:if="${a.isTop == 1}">顶</span>
                                <span th:text="${a.title}"></span>
                            </td>
                            <td><span th:text="${a.category?.name}" class="text-muted"></span></td>
                            <td>
                                <span class="badge bg-success" th:if="${a.status == 1}">已发布</span>
                                <span class="badge bg-secondary" th:if="${a.status == 0}">草稿</span>
                            </td>
                            <td th:text="${a.viewCount}">0</td>
                            <td><small th:text="${#temporals.format(a.createdAt, 'yyyy-MM-dd')}"></small></td>
                            <td>
                                <a th:href="@{/admin/article/{id}/edit(id=${a.id})}" class="btn btn-sm btn-outline-primary">编辑</a>
                                <a th:if="${a.status == 0}" th:href="@{/admin/article/{id}/publish(id=${a.id})}" class="btn btn-sm btn-outline-success">发布</a>
                                <a th:if="${a.status == 1}" th:href="@{/admin/article/{id}/withdraw(id=${a.id})}" class="btn btn-sm btn-outline-warning">撤回</a>
                                <a th:href="@{/admin/article/{id}/delete(id=${a.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('确定删除这篇文章吗？')">删除</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div th:unless="${articlePage != null && !articlePage.records.isEmpty()}" class="text-center py-5 text-muted">暂无文章</div>
        </div>

        <!-- Pagination -->
        <nav th:if="${articlePage != null && articlePage.totalPages > 1}" class="mt-3">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${articlePage.page == 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/articles(page=${articlePage.page - 1}, categoryId=${categoryId}, status=${status}, keyword=${keyword})}">&laquo;</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(1, articlePage.totalPages)}"
                    th:classappend="${i == articlePage.page} ? 'active'">
                    <a class="page-link" th:href="@{/admin/articles(page=${i}, categoryId=${categoryId}, status=${status}, keyword=${keyword})}" th:text="${i}">1</a>
                </li>
                <li class="page-item" th:classappend="${articlePage.page == articlePage.totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/articles(page=${articlePage.page + 1}, categoryId=${categoryId}, status=${status}, keyword=${keyword})}">&raquo;</a>
                </li>
            </ul>
        </nav>
    </main>
</th:block>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
