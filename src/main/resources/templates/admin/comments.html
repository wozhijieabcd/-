<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('评论管理 - 后台管理')}"></head>
<body>
<th:block th:replace="~{fragments/admin-layout :: shell('comments', ~{::main})}">
    <main>
        <div class="alert alert-success alert-dismissible fade show" th:if="${success}" th:text="${success}"><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
        <div class="alert alert-danger alert-dismissible fade show" th:if="${error}" th:text="${error}"><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>

        <h4 class="mb-4"><i class="bi bi-chat-dots me-2"></i>评论管理</h4>

        <div class="card border-0 shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover mb-0" th:if="${comments != null && !comments.isEmpty()}">
                    <thead class="table-light"><tr>
                        <th style="width:50px;">ID</th>
                        <th>评论者</th>
                        <th>内容</th>
                        <th>文章</th>
                        <th>时间</th>
                        <th>状态</th>
                        <th style="width:140px;">操作</th>
                    </tr></thead>
                    <tbody>
                        <tr th:each="c : ${comments}">
                            <td th:text="${c.id}"></td>
                            <td>
                                <span th:text="${c.user?.nickname}"></span>
                                <i class="bi bi-arrow-return-right text-muted ms-1" th:if="${c.parentId != null}" title="回复评论"></i>
                            </td>
                            <td style="max-width:300px;">
                                <span class="text-muted" th:text="${#strings.abbreviate(c.content, 80)}"></span>
                            </td>
                            <td><small th:text="${c.articleId}"></small></td>
                            <td><small th:text="${#temporals.format(c.createdAt, 'yyyy-MM-dd HH:mm')}"></small></td>
                            <td>
                                <span class="badge bg-success" th:if="${c.status == 1}">显示</span>
                                <span class="badge bg-secondary" th:if="${c.status == 0}">隐藏</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/comment/{id}/toggle(id=${c.id})}"
                                   class="btn btn-sm" th:classappend="${c.status == 1} ? 'btn-outline-warning' : 'btn-outline-success'"
                                   th:text="${c.status == 1} ? '隐藏' : '显示'"></a>
                                <a th:href="@{/admin/comment/{id}/delete(id=${c.id})}" class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('确定删除该评论？')">删除</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div th:unless="${comments != null && !comments.isEmpty()}" class="text-center py-5 text-muted">暂无评论</div>
        </div>
    </main>
</th:block>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
