<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('仪表盘 - 后台管理')}"></head>
<body>
<th:block th:replace="~{fragments/admin-layout :: shell('dashboard', ~{::main})}">
    <main>
        <h4 class="mb-4"><i class="bi bi-speedometer2 me-2"></i>仪表盘</h4>

        <!-- Stat cards -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="bg-primary bg-opacity-10 rounded-3 p-3"><i class="bi bi-file-text fs-4 text-primary"></i></div>
                        <div>
                            <p class="text-muted mb-0 small">文章总数</p>
                            <h3 class="mb-0" th:text="${totalArticles}">0</h3>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="bg-success bg-opacity-10 rounded-3 p-3"><i class="bi bi-check-circle fs-4 text-success"></i></div>
                        <div>
                            <p class="text-muted mb-0 small">已发布</p>
                            <h3 class="mb-0" th:text="${publishedCount}">0</h3>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="bg-warning bg-opacity-10 rounded-3 p-3"><i class="bi bi-pencil-square fs-4 text-warning"></i></div>
                        <div>
                            <p class="text-muted mb-0 small">草稿</p>
                            <h3 class="mb-0" th:text="${draftCount}">0</h3>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="bg-info bg-opacity-10 rounded-3 p-3"><i class="bi bi-folder fs-4 text-info"></i></div>
                        <div>
                            <p class="text-muted mb-0 small">分类数</p>
                            <h3 class="mb-0" th:text="${totalCategories}">0</h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent comments -->
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white fw-bold">最新评论</div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0" th:if="${recentComments != null && !recentComments.isEmpty()}">
                    <thead class="table-light"><tr>
                        <th>评论者</th><th>内容</th><th>时间</th><th>状态</th>
                    </tr></thead>
                    <tbody>
                        <tr th:each="c : ${recentComments}">
                            <td th:text="${c.user?.nickname}"></td>
                            <td class="text-muted" style="max-width:400px;" th:text="${#strings.abbreviate(c.content, 60)}"></td>
                            <td><small th:text="${#temporals.format(c.createdAt, 'MM-dd HH:mm')}"></small></td>
                            <td>
                                <span class="badge bg-success" th:if="${c.status == 1}">显示</span>
                                <span class="badge bg-secondary" th:if="${c.status == 0}">隐藏</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div th:unless="${recentComments != null && !recentComments.isEmpty()}" class="text-center py-4 text-muted">暂无评论</div>
            </div>
        </div>
    </main>
</th:block>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
