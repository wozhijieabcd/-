<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<header th:fragment="header">
    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/" style="color: var(--primary);">
                <i class="bi bi-journal-text"></i> 我的博客
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                    <li class="nav-item dropdown" th:if="${categories != null && !categories.isEmpty()}">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">分类</a>
                        <ul class="dropdown-menu">
                            <li th:each="cat : ${categories}">
                                <a class="dropdown-item" th:href="@{/(categoryId=${cat.id})}">
                                    <span th:text="${cat.name}">分类名</span>
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" href="/login">登录</a>
                    </li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" href="/register">注册</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" href="/admin/dashboard"><i class="bi bi-gear"></i> 后台</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" style="display:inline;">
                            <button type="submit" class="nav-link text-danger border-0 bg-transparent">退出</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>
</html>
