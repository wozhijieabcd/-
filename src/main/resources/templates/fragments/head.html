<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: '个人博客'">个人博客</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; }
        a { text-decoration: none; }

        .article-card { transition: transform .15s, box-shadow .15s; border: 1px solid #e2e8f0; border-radius: 12px; }
        .article-card:hover { transform: translateY(-2px); box-shadow: 0 4px 24px rgba(0,0,0,.08); }
        .article-card .card-title a { color: #1e293b; }
        .article-card .card-title a:hover { color: var(--primary); }
        .article-meta { font-size: .875rem; color: #94a3b8; }
        .article-meta span { margin-right: 1rem; }

        .sidebar-card { border: 1px solid #e2e8f0; border-radius: 12px; }
        .sidebar-card .card-header { background: transparent; font-weight: 600; border-bottom: 1px solid #e2e8f0; }

        .admin-sidebar { width: 240px; min-height: calc(100vh - 56px); background: #1e293b; }
        .admin-sidebar .nav-link { color: #cbd5e1; padding: .75rem 1.25rem; border-radius: 8px; margin: 2px 8px; }
        .admin-sidebar .nav-link:hover, .admin-sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,.1); }
        .admin-main { flex: 1; padding: 0; }
        .admin-topbar { background: #fff; border-bottom: 1px solid #e2e8f0; height: 56px; }

        .comment-item { border-bottom: 1px solid #f1f5f9; padding: 16px 0; }
        .comment-reply { margin-left: 48px; background: #f8fafc; border-radius: 8px; padding: 12px 16px; margin-top: 8px; }

        .pagination { --bs-pagination-active-bg: var(--primary); --bs-pagination-active-border-color: var(--primary); }

        .article-content { font-size: 1.05rem; line-height: 1.85; color: #334155; }
        .article-content img { max-width: 100%; border-radius: 8px; }
        .article-content pre { background: #1e293b; color: #e2e8f0; padding: 16px; border-radius: 8px; overflow-x: auto; }
        .article-content blockquote { border-left: 4px solid var(--primary); padding-left: 16px; color: #64748b; margin: 1rem 0; }

        .badge-category { background: #eff6ff; color: var(--primary); font-weight: 500; }
        .top-badge { background: #fef3c7; color: #d97706; font-size: .75rem; }
        .empty-state { padding: 60px 0; color: #94a3b8; }
    </style>
</head>
</html>
